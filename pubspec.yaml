name: trips_apps
description: "A new Flutter project."

publish_to: "none"

version: 1.0.7+7

environment:
  sdk: ^3.10.3

dependencies:
  bloc: ^8.1.4
  cloud_firestore: ^6.1.1
  cupertino_icons: ^1.0.8
  dchs_flutter_beacon: ^0.6.6
  device_preview: ^1.3.1
  dio: ^5.0.0
  pretty_dio_logger: ^1.4.0
  equatable: ^2.0.8
  firebase_auth: ^6.1.3
  firebase_core: ^4.3.0
  firebase_messaging: ^16.1.1
  flutter:
    sdk: flutter
  flutter_bloc: ^8.0.1
  flutter_blue_plus: ^2.1.0
  flutter_local_notifications: ^20.0.0
  flutter_native_splash: ^2.4.7
  flutter_svg: ^2.0.9
  get_it: ^9.2.0
  go_router: ^17.0.1
  image_picker: ^0.8.7+5
  intl: ^0.20.2
  package_info_plus: ^8.1.2
  dotted_border: ^2.0.0
  path: ^1.8.3
  path_provider: ^2.0.15
  pdf: ^3.10.1
  permission_handler: ^11.3.1
  printing: ^5.11.0
  share_plus: ^6.2.0
  shared_preferences: ^2.2.2
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4

dependency_overrides:
  share_plus: ^12.0.1

flutter_native_splash:
  color: "#0E7C7B"
  image: assets/png/splashscreen.png
  android: true
  ios: true

flutter_icons:
  android: true
  ios: true
  image_path: assets/png/splashscreen.png
  remove_alpha_ios: true
  background_color: "#0E7C7B"

flutter:
  uses-material-design: true

  assets:
    - assets/svg/plant.svg
    - assets/svg/computer.svg
    - assets/png/splashscreen.png
    - assets/png/login.png
    - assets/png/empty.png
